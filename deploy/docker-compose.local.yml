# Précis-MCP — local / single-user bundle (the Quickstart stack).
#
# ClickHouse + Postgres + the dev-key MCP server. No Keycloak, no Redis: one
# static key replaces per-user OAuth. Postgres plays two roles — the platform
# DB (load_history behind ingestion + the ingestion advisory lock)
# and the mock customer source the sample-data generator writes to. For a
# multi-user server real users sign in to, use the Keycloak bundle in
# docker-compose.yml instead.
#
# No source checkout needed: this file pulls the published image, which already
# bundles the demo model. Download just this one file, mint a key (later compose
# commands against it re-read the key), and bring it up:
#   curl -O https://raw.githubusercontent.com/precis-finance/precis-mcp/main/deploy/docker-compose.local.yml
#   export MCP_DEV_KEY=$(openssl rand -hex 32)
#   docker compose -f docker-compose.local.yml up -d
# (`up --build` builds from a source checkout instead — for rolling main / forks.)
#
# Then point an MCP client at  http://127.0.0.1:8768/mcp  with header
#   Authorization: Bearer $MCP_DEV_KEY
#
# Populate the demo model (sample data through the full ingestion pipeline):
#   docker compose -f docker-compose.local.yml exec precis-mcp \
#     python -m precis_mcp.sample_data
#
# Bring your own model: the image's bundled demo instance serves by default.
# To serve your own, overlay the instance mount and point it at your directory:
#   PRECIS_INSTANCE_DIR=/path/to/your/instance docker compose \
#     -f docker-compose.local.yml -f docker-compose.instance.yml up -d
# (point CH* at a ClickHouse you already populate, or load into this one — see
# open_docs/configuration/ingestion.md).
#
# Note: this single-user trial always STARTS the bundled ClickHouse (there is no
# profile to suppress it — its value is zero-config). You can point CH* at your
# own instance, but the bundled service still runs. For a true bring-your-own
# deployment that does not start a bundled ClickHouse, use the multi-user bundle
# (docker-compose.yml) with `scripts/deploy-mcp.sh --data-mode byo`.

name: precis-mcp-local

services:
  postgres:
    image: postgres:16@sha256:ab47a724d0e37131ac950b98ff2beeb3fdb3bfcc592d73c6cc4b4e7626649671
    restart: unless-stopped
    environment:
      POSTGRES_DB: precis
      POSTGRES_USER: ${PGUSER:-precis}
      POSTGRES_PASSWORD: ${PGPASSWORD:-precis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-precis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.3@sha256:1f7cd090d5c4e2b8bfe0ea5d8ae6125937e1d932c6371b4d25fbd6088829dc9c
    restart: unless-stopped
    # Default seccomp profile — see the note in docker-compose.yml.
    environment:
      CLICKHOUSE_DB: ${CHDATABASE:-precis}
      CLICKHOUSE_USER: ${CHUSER:-precis}
      CLICKHOUSE_PASSWORD: ${CHPASSWORD:-precis}
    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  precis-mcp:
    # Pull the published image by default (it bundles the demo instance, so no
    # source checkout is needed); `up --build` builds from a checkout instead.
    # Same image as the multi-user bundle.
    image: ghcr.io/precis-finance/precis-mcp:${PRECIS_MCP_TAG:-0.1.1}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    # The image runs as a non-root user; it needs no Linux capabilities and
    # must not gain privileges through setuid binaries.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    # Override the image's Précis agent CMD: run the dev-key MCP server,
    # which boots only the open read surface (engine + read tools over
    # Streamable HTTP).
    command: ["python", "-m", "precis_mcp.server"]
    environment:
      # Dev-server three-gate (precis_mcp/server.py): explicit enable + a
      # 32+ char key + bind host. 0.0.0.0 inside the isolated container is
      # safe — the published port below is bound to 127.0.0.1 on the host,
      # so the localhost-only guarantee holds at the network edge.
      ENABLE_MCP_DEV_SERVER: "1"
      MCP_DEV_KEY: ${MCP_DEV_KEY:?set MCP_DEV_KEY to a 32+ char random string — openssl rand -hex 32}
      MCP_BIND_HOST: "0.0.0.0"
      MCP_BIND_PORT: "8768"
      # ClickHouse read layer (precis_mcp/db.py:get_clickhouse_client).
      CHHOST: clickhouse
      CHPORT: "8123"
      CHUSER: ${CHUSER:-precis}
      CHPASSWORD: ${CHPASSWORD:-precis}
      # Platform DB (load_history + the ingestion advisory lock) and the
      # sample-data generator's mock customer source (PGDATABASE default
      # fpa_actuals — created by the generator on first run).
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${PGUSER:-precis}
      PGPASSWORD: ${PGPASSWORD:-precis}
      PLATFORM_DB_NAME: ${PLATFORM_DB_NAME:-precis_platform}
      # The `customer_pg` source (ingestion bindings + federated reads).
      # Defaults to the mock source the sample-data generator populates;
      # point at your own warehouse to ingest real data.
      CUSTOMER_PG_HOST: ${CUSTOMER_PG_HOST:-postgres}
      CUSTOMER_PG_PORT: ${CUSTOMER_PG_PORT:-5432}
      CUSTOMER_PG_USER: ${CUSTOMER_PG_USER:-${PGUSER:-precis}}
      CUSTOMER_PG_PASSWORD: ${CUSTOMER_PG_PASSWORD:-${PGPASSWORD:-precis}}
      CUSTOMER_PG_DATABASE: ${CUSTOMER_PG_DATABASE:-fpa_actuals}
      # File-drop landing root (CRM CSVs from the generator + your own drops).
      PRECIS_INGEST_UPLOAD_DIR: /data/ingest
    ports:
      - "127.0.0.1:8768:8768"
    volumes:
      # No instance mount by default: the image already bundles the demo model,
      # so the single-user trial needs no source checkout. To serve your own
      # model, overlay docker-compose.instance.yml (which adds the bind mount
      # over /app/instance and requires PRECIS_INSTANCE_DIR).
      - ingest_dropbox:/data/ingest
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  clickhouse_data:
  postgres_data:
  ingest_dropbox:
